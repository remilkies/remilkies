name: Commit Snack Snake
on:
  schedule: # execute every 12 hours
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Snake Animation
      - uses: actions/cheakout@v3

      - name: Genertae Snakeline
        uses: Plantane/snk@v3

        with:
          github_user_name: remilkies
          outputs: |
            dist/github-snake.svg?color_snake=#67161F&color_dots=#161b22,#F0DBBE,#D48E8D,#9D454A,#67161F
            dist/github-snake-dark.svg?color_snake=#67161F&color_dots=#161b22,#F0DBBE,#D48E8D,#9D454A,#67161F
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to Output Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "🐍 update creepy snake animation"
